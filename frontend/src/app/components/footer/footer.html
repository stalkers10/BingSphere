<footer class="footer">
  <div class="footer__brand">Bingshere</div>

  <div class="footer__grid">
    <div *ngFor="let column of footerColumns" class="footer__column">
      <button *ngFor="let item of column" type="button" class="footer-link">
        {{ item }}
      </button>
    </div>
  </div>

  <button type="button" class="service-code">Service Code</button>
  <p class="footer__copyright">(c) 2025-2026 Bingshere, Inc.</p>
</footer>
